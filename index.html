<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swarm Hex</title>
  </head>
  <body>
    <div id="ui-layer">
      <div class="stat" style="display: flex; align-items: center; gap: 8px; justify-content: flex-start; flex: 1;">
        <img src="/b1.png" alt="Swarm" style="width: 24px; height: 24px;">
        <span id="beeCountVal">10</span>
      </div>
      <div id="tug-of-war" style="flex: 0 0 auto;">
        <div id="tug-swarm"></div>
        <div id="tug-blight"></div>
      </div>
      <div style="flex: 1;"></div>
    </div>
    <div id="game-over" style="display: none;">
      <h1>The Hive Has Fallen</h1>
      <button id="restartBtn">Rebuild Hive</button>
    </div>
    <div id="game-won" style="display: none;">
      <h1 style="color: #00FF00;">Swarm Dominance Achieved!</h1>
      <button id="replayBtn">Play Again</button>
    </div>
    

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
