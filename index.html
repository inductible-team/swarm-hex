<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swarm Hex</title>
  </head>
  <body>
    <div id="ui-layer">
      <div id="tug-of-war">
        <div id="tug-swarm"></div>
        <div id="tug-blight"></div>
      </div>
      <div class="stat">Swarm Size: <span id="beeCountVal">10</span></div>
    </div>
    <div id="game-over" style="display: none;">
      <h1>The Hive Has Fallen</h1>
      <button id="restartBtn">Rebuild Hive</button>
    </div>
    <div id="game-won" style="display: none;">
      <h1 style="color: #00FF00;">Swarm Dominance Achieved!</h1>
      <button id="replayBtn">Play Again</button>
    </div>
    
    <div id="beacon-toolbar">
      <button id="btn-move" class="beacon-btn active">Move</button>
      <button id="btn-wax" class="beacon-btn">Expand Hive <span class="cd" id="cd-wax"></span></button>
      <button id="btn-brood" class="beacon-btn">Prepare Brood <span class="cd" id="cd-brood"></span></button>
      <button id="btn-blight" class="beacon-btn">Clear Blight <span class="cd" id="cd-blight"></span></button>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
